services:
  - type: web
    name: digital-twin
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    disk:
      name: db-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false          # You will fill this manually in Render dashboard
      - key: DATABASE_PATH
        value: /data/digital_twin.db
